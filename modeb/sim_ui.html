<!doctype html>
<meta charset="utf-8">
<title>Yappa 模拟台(开发驾驶舱)</title>
<style>
  :root { color-scheme: dark; font-family: system-ui, sans-serif; }
  body { margin: 0; background: #111; color: #eee; display: grid;
         grid-template-columns: 2fr 1fr; gap: 8px; padding: 8px; }
  h3 { margin: 4px 0; font-size: 14px; color: #9cf; }
  .card { background: #1b1b1f; border: 1px solid #333; border-radius: 8px; padding: 8px; }
  #panes { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; }
  .pane { background: #202028; border: 1px solid #444; border-radius: 8px; padding: 8px; }
  .pane b { font-size: 15px; }
  .score { float: right; color: #fc6; }
  .inboxbox { background: #2a2a1a; border: 1px dashed #886; border-radius: 6px;
              margin-top: 4px; padding: 4px; font-size: 12px; clear: both; }
  .focus { outline: 2px solid #fc6; }
  button { margin: 2px; padding: 4px 8px; border-radius: 6px; border: 1px solid #555;
           background: #2a2a33; color: #eee; cursor: pointer; }
  button:hover { background: #39394a; }
  textarea, input, select { width: 100%; box-sizing: border-box; background: #191920;
           color: #eee; border: 1px solid #444; border-radius: 6px; padding: 4px; }
  #log { height: 300px; overflow-y: auto; font-size: 12px; white-space: pre-wrap;
         font-family: ui-monospace, monospace; }
  .turnline { border-bottom: 1px dashed #333; padding: 3px 0; }
  .host-text { color: #9f9; }
  .clamp { color: #f66; }
  .events { color: #8bd; font-size: 12px; padding-left: 10px; }
  .ev { margin-right: 8px; white-space: nowrap; }
  small { color: #888; }
</style>
<div>
  <div id="err" style="display:none;background:#511;color:#fbb;border:1px solid #944;
       padding:6px 8px;margin-bottom:6px;border-radius:4px;font-size:13px"></div>
  <div class="card" id="setup">
    <h3>开局(机位 2–10 任意,机制不随机位变)</h3>
    <input id="players" value="疯子明,小静,大鹏,阿伟,琳琳,老宋">
    <div style="display:flex;gap:6px;margin-top:4px">
      <input id="minutes" value="30" title="想玩多久(分钟)">
      <input id="wildness" value="6" title="野度档">
      <select id="driver"><option value="manual">manual 主持台驱动</option>
        <option value="scripted">scripted 演示(≥3人)</option>
        <option value="llm">llm 活局长(需 API key 环境变量)</option></select>
    </div>
    <input id="objects" value="瓶子,冰块,纸巾,手机,杯子,打火机" title="现场实物(perceive 扫描占位)">
    <input id="bots" placeholder="bot 座位,如 阿伟:显眼包,琳琳:气氛组组长(留空=全真人)">
    <input id="playlist" placeholder="🎵 歌单(逗号分隔,如 Mojito-周杰伦,APT.-ROSÉ;留空=局长不当DJ)" title="房主上传歌单;AI 只读只调,点歌单外的歌会被钳制">
    <div style="display:flex;gap:6px;margin-top:4px">
      <select id="provider" onchange="syncModels()"><option>anthropic</option><option>deepseek</option><option>kimi</option><option>glm</option><option>qwen</option><option>minimax</option></select>
      <input id="hostmodel" value="sonnet" title="主持模型">
      <input id="seatmodel" value="sonnet" title="桌友模型">
      <select id="scorestyle" title="结算风格(驾驶舱调试用;产品端零设置,AI读场匹配)"><option value="自动">自动(AI读场)</option>
        <option value="清账">清账(即时结算)</option>
        <option value="综艺">综艺(可攒分颁奖)</option>
        <option value="竞技">竞技(真排名真冠军)</option></select>
      <label style="white-space:nowrap"><input type="checkbox" id="auto" style="width:auto"> 自动回合</label>
    </div>
    <button onclick="start()">开局</button>
  </div>
  <div class="card" id="askcard" style="display:none"><h3>🎤 主持在问</h3><div id="ask"></div></div>
  <div class="card"><h3>玩家机位</h3><div id="panes"></div></div>
  <div class="card"><h3>主持台(manual 驱动:填决策→执行回合)</h3>
    <input id="htext" placeholder="主持词 ≤3 句">
    <textarea id="htools" rows="3" placeholder='tool_use JSON,如 [{"name":"draw_atom","input":{"野度":5}}]'></textarea>
    <div>
      快捷:
      <button onclick="quick('[{&quot;name&quot;:&quot;state.next_round&quot;,&quot;input&quot;:{}}]')">下一轮</button>
      <button onclick="quick('[{&quot;name&quot;:&quot;draw_atom&quot;,&quot;input&quot;:{&quot;野度&quot;:5}}]')">抽原子</button>
      <button onclick="quick('[{&quot;name&quot;:&quot;random.pick&quot;,&quot;input&quot;:{&quot;from&quot;:&quot;players&quot;}}]')">随机点人</button>
      <button onclick="finishNow()">🛑 收局</button>
      <button style="background:#274" onclick="turn()">▶ 执行回合</button>
    </div>
  </div>
</div>
<div>
  <div class="card"><h3>账本 / digest</h3><div id="digest" style="font-size:12px;font-family:ui-monospace,monospace"></div></div>
  <div class="card"><h3>episode 实时窗</h3><div id="log"></div></div>
</div>
<script>
const $ = id => document.getElementById(id);
// 一律返回对象;失败也走 {error} 而不是抛出去。抛出去会变成无人接管的
// promise rejection,页面纹丝不动,房主只看到「点了没反应」。
async function api(path, body) {
  try {
    const r = await fetch(path, body ? {method:"POST", body: JSON.stringify(body)} : undefined);
    const raw = await r.text();
    if (!raw) return {error: `服务端无响应(HTTP ${r.status})——多半是回合里抛了异常,看终端`};
    try { return JSON.parse(raw); }
    catch (e) { return {error: `服务端返回的不是 JSON:${raw.slice(0, 200)}`}; }
  } catch (e) {
    return {error: `连不上模拟台(${e.message})——simulator 还在跑吗?`};
  }
}
// 出错时同时停掉自动回合:否则 4 秒心跳会永远重试,每次都可能先烧一次 API。
// 用常驻状态条而非 alert():4 秒轮询下的 alert 会变成阻塞式模态框风暴,
// 把整个浏览器堵死——比"点了没反应"还糟。
function bail(r) {
  if (!r || !r.error) return false;
  $("auto").checked = false;
  $("err").textContent = "⚠️ " + r.error;
  $("err").style.display = "";
  return true;
}
function clearErr() { $("err").style.display = "none"; }
// 各家默认模型:换 provider 时同步两个模型框,免得把 sonnet/haiku 发给国产口。
const PROVIDER_MODELS = {
  anthropic: ["sonnet", "haiku"],
  deepseek: ["deepseek-v4-pro", "deepseek-v4-flash"],
  kimi: ["kimi-k2.6", "kimi-k2.6"],
  glm: ["glm-5.1", "glm-5.1"],
  qwen: ["qwen3.7-plus", "qwen3.7-plus"],
  minimax: ["MiniMax-M2.7", "MiniMax-M2.7"],
};
function syncModels() {
  const [host, seat] = PROVIDER_MODELS[$("provider").value] || [];
  if (host) { $("hostmodel").value = host; $("seatmodel").value = seat; }
}
async function start() {
  const bots = {};
  $("bots").value.split(",").map(x => x.trim()).filter(Boolean).forEach(x => {
    const [n, p] = x.split(/[::]/); bots[n.trim()] = (p || "").trim(); });
  const r = await api("/api/start", {
    players: $("players").value.split(","), minutes: +$("minutes").value,
    wildness: +$("wildness").value, objects: $("objects").value.split(","),
    playlist: $("playlist").value.split(",").map(s => s.trim()).filter(Boolean),
    driver: $("driver").value, bots,
    provider: $("provider").value, host_model: $("hostmodel").value,
    seat_model: $("seatmodel").value, score_style: $("scorestyle").value });
  if (bail(r)) return;
  refresh();
}
setInterval(async () => {  // 事件驱动心跳:有新事件/计时器到点才叫醒主持——没动静就让它等
  const st = await api("/api/state");
  if (bail(st)) return;
  if ($("auto").checked && !st.no_session && !st.finished && st.driver !== "manual" && st.turn_ready) {
    const line = await api("/api/turn", {});
    if (bail(line)) return;   // 一次失败即停自动回合,不做无声重试
    refresh();
  }
}, 2000);
function quick(js) { $("htools").value = js; }
// 收局走专用口,不经过模型;顺手关掉自动回合,确保 4 秒心跳彻底停下。
async function finishNow() {
  $("auto").checked = false;
  if (bail(await api("/api/finish", {}))) return;
  refresh();
}
async function turn() {
  let tools = [];
  try { tools = $("htools").value.trim() ? JSON.parse($("htools").value) : []; }
  catch (e) { alert("tool_use JSON 不合法: " + e); return; }
  const line = await api("/api/turn", {text: $("htext").value, tool_use: tools});
  if (bail(line)) return;
  $("htext").value = ""; $("htools").value = "";
  refresh();
}
async function ev(type, player, extra) {
  if (bail(await api("/api/event", Object.assign({type, player}, extra || {})))) return;
  refresh();
}
function paneHtml(p, s) {
  const focus = s.digest.focus === p ? "pane focus" : "pane";
  const err = (s.bot_errors || {})[p];
  const bot = (s.bots || []).includes(p)
    ? (err ? ` <span class="clamp" title="${err.last}">🤖⚠️×${err.count}</span>` : " 🤖") : "";
  const n = (s.inbox_counts || {})[p] || 0;
  const mail = n ? ` <button onclick="peek('${p}')" title="私密收件,仅 ${p} 本人可见">📬×${n}</button>` : "";
  const mailbox = peeked.has(p) && n
    ? `<div class="inboxbox">${(inboxCache[p] || []).map(x => `<div>${x}</div>`).join("") || "…"}</div>` : "";
  return `<div class="${focus}"><b>${p}${bot}</b>${mail}<span class="score">${s.digest.scores[p]}</span>${mailbox}<br>
    <button onclick="ev('done','${p}')">✅ 完成</button>
    <button onclick="ev('forfeit','${p}')">🍺 认罚跳过</button>
    <button onclick="ev('vote','${p}',{value:'赞成'})">🗳 赞</button>
    <button onclick="ev('vote','${p}',{value:'反对'})">🗳 反</button>
    <button onclick="ev('ritual_done','${p}')">🪄 仪式</button>
    <button onclick="ev('optout','${p}')" title="零代价安全退出(底线,罕用)">🚫</button>
    <button onclick="ev('laugh','${p}')" title="观察员打点:替代纸笔笑声账本;产品端无此键,笑声走感知窗口+局后问卷">😂</button>
    ${bot ? "" : `<div style="display:flex;gap:4px;margin-top:4px">
      <input id="say-${p}" placeholder="说点什么(回车=桌上)" style="flex:1"
             onkeydown="if(event.key==='Enter')sayAs('${p}','桌上')">
      <button onclick="sayAs('${p}','桌上')" title="对桌友说;按钮档下主持听不见内容">💬 桌上</button>
      <button onclick="sayAs('${p}','局长')" title="定向对主持说(问规则/申诉/答问询),任何档全文送达">🎙 局长</button></div>`}</div>`;
}
// 真人座位的发言口,两路:桌上互说 vs 对局长说(现实里天然分开,只有 agent 桌混着)。
async function sayAs(p, to) {
  const el = $("say-" + p), text = el.value.trim();
  if (!text) return;
  el.value = "";
  await ev("say", p, {text, to: to || "桌上"});
}
// 桌面反应(桌友 agent + 真人)。这些事件是本回合开始前收上来的,
// 即对上一拍的回应——过去只喂给主持,驾驶舱里完全看不见。
const EV_ICON = {laugh: "😂", pass: "🙅", tap: "👍", vote: "🗳", ritual_done: "🪄", say: "💬"};
function eventsHtml(events) {
  if (!events || !events.length) return "";
  const parts = events.map(e => {
    const body = e.text ? `「${e.text}」` : (e.value || "");
    const icon = e.type === "say" && e.to === "局长" ? "🎙" : (EV_ICON[e.type] || e.type);
    return `<span class="ev">${e.player} ${icon} ${body}</span>`;
  });
  return `<div class="events">↩ ${parts.join(" ")}</div>`;
}
// 把主持最近一次 ask 顶到显眼处;有 options 就渲染成可点的按钮。
function renderAsk(s) {
  let ask = null;
  for (const t of s.recent_turns) for (const r of (t.results || []))
    if (r.tool === "ask" && r.ok) ask = r.result;
  if (!ask) { $("askcard").style.display = "none"; return; }
  $("askcard").style.display = "";
  const seats = s.players.filter(p => !(s.bots || []).includes(p));
  const opts = (ask.options || []).map(o =>
    seats.map(p => `<button onclick="ev('say','${p}',{text:'${o}',to:'局长'})">${o}${seats.length > 1 ? ` (${p})` : ""}</button>`).join("")).join(" ");
  $("ask").innerHTML = `<div><b>@${ask.asked}</b> ${ask.prompt}</div>${opts ? `<div style="margin-top:4px">${opts}</div>` : ""}`;
}
// 私密收件箱:📬 只在有件时亮;演示台是上帝视角,真机上各看各的。
const peeked = new Set(), inboxCache = {};
function peek(p) {
  peeked.has(p) ? peeked.delete(p) : peeked.add(p);
  refresh();
}
async function pullInboxes() {
  for (const p of [...peeked]) {
    const r = await api("/api/inbox?player=" + encodeURIComponent(p));
    if (r && !r.error) inboxCache[p] = r.inbox; else peeked.delete(p);
  }
}
async function refresh() {
  const s = await api("/api/state");
  if (bail(s)) return;                 // 静默失败到此为止
  clearErr();                          // 这次通了,把上次的错误条撤掉
  if (s.no_session) { $("digest").textContent = "未开局"; return; }
  await pullInboxes();
  $("panes").innerHTML = s.players.map(p => paneHtml(p, s)).join("");
  renderAsk(s);
  const he = s.host_errors;
  $("digest").textContent = JSON.stringify(s.digest, null, 1)
    + "\n埋点 " + JSON.stringify(s.marks) + (s.finished ? "\n【局已收】" : "")
    + (he ? `\n${he.streak >= 5 ? "⛔ 主持掉线" : "⚠️ 主持沉默拍"}×${he.streak}(累计${he.count}): ${he.last}` : "");
  $("log").innerHTML = s.recent_turns.map(t => t.episode_summary
    ? `<div class="turnline">🏁 ${JSON.stringify(t)}</div>`
    : `<div class="turnline">#${t.turn} <span class="host-text">${t.text}</span> `
      + `${JSON.stringify(t.tool_use)}`
      + (t.results||[]).filter(r=>!r.ok).map(r=>` <span class="clamp">⛔${r.clamped}</span>`).join("")
      + (t.results||[]).filter(r=>r.ok&&r.result&&r.result.demo_ref).map(r=>` <span class="ev">🎬 ${r.result.demo_ref}(资产未上线,降级文字)</span>`).join("")
      + eventsHtml(t.events_in)
      + `</div>`).join("");
  $("log").scrollTop = $("log").scrollHeight;
}
setInterval(refresh, 1000); refresh();
</script>
