<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif">
  <rect width="800" height="500" fill="#fdfbf6"/>
  <text x="40" y="52" font-size="30" font-weight="bold" fill="#22303f">数枪点喝</text>
  <text x="40" y="80" font-size="14" fill="#8a94a0">pat-t1-04 · 庄家依次比手指 1–7,第 7 个手势像一把枪</text>

  <!-- 1–6 计数圈 -->
  <g font-size="22" font-weight="bold" text-anchor="middle">
    <circle cx="90"  cy="170" r="30" fill="#e8eef4" stroke="#4a7fb5" stroke-width="3"/>
    <circle cx="170" cy="170" r="30" fill="#e8eef4" stroke="#4a7fb5" stroke-width="3"/>
    <circle cx="250" cy="170" r="30" fill="#e8eef4" stroke="#4a7fb5" stroke-width="3"/>
    <circle cx="330" cy="170" r="30" fill="#e8eef4" stroke="#4a7fb5" stroke-width="3"/>
    <circle cx="410" cy="170" r="30" fill="#e8eef4" stroke="#4a7fb5" stroke-width="3"/>
    <circle cx="490" cy="170" r="30" fill="#e8eef4" stroke="#4a7fb5" stroke-width="3"/>
    <text x="90"  y="178" fill="#4a7fb5">1</text><text x="170" y="178" fill="#4a7fb5">2</text>
    <text x="250" y="178" fill="#4a7fb5">3</text><text x="330" y="178" fill="#4a7fb5">4</text>
    <text x="410" y="178" fill="#4a7fb5">5</text><text x="490" y="178" fill="#4a7fb5">6</text>
  </g>
  <text x="290" y="122" font-size="15" fill="#8a94a0">庄家依次比数……</text>

  <!-- 第 7 拍:枪手势(拳 + 食指前伸 + 拇指立起) -->
  <circle cx="600" cy="300" r="52" fill="#d98943"/>
  <line x1="640" y1="292" x2="742" y2="288" stroke="#d98943" stroke-width="30" stroke-linecap="round"/>
  <line x1="600" y1="252" x2="600" y2="196" stroke="#d98943" stroke-width="28" stroke-linecap="round"/>
  <text x="600" y="382" font-size="20" font-weight="bold" fill="#d98943" text-anchor="middle">7 = 枪!</text>

  <!-- 被指的人 -->
  <circle cx="740" cy="180" r="4" fill="none"/>
  <path d="M 700 270 L 700 218" stroke="#c0392b" stroke-width="4" stroke-dasharray="8 6"/>
  <circle cx="700" cy="190" r="22" fill="#e8eef4" stroke="#c0392b" stroke-width="3"/>
  <path d="M 672 240 q 28 -22 56 0" stroke="#c0392b" stroke-width="8" fill="none" stroke-linecap="round"/>
  <text x="700" y="150" font-size="15" fill="#c0392b" text-anchor="middle">枪口指到谁</text>

  <text x="40" y="470" font-size="16" fill="#22303f">① 庄家依次比手指 1、2、3……　② 比到 7 时手势变成一把枪　③ 枪口指到谁,谁进结算(结算主持宣布)</text>
</svg>
