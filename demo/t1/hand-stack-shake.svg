<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif">
  <rect width="800" height="500" fill="#fdfbf6"/>
  <text x="40" y="52" font-size="30" font-weight="bold" fill="#22303f">叠手抓摇</text>
  <text x="40" y="80" font-size="14" fill="#8a94a0">pat-t1-03 · 侧视图 · 判定条件由主持现场宣布</text>

  <!-- 手塔:交替色手掌侧视(圆角胶囊) -->
  <g>
    <rect x="300" y="330" width="180" height="34" rx="17" fill="#4a7fb5"/>
    <rect x="315" y="292" width="180" height="34" rx="17" fill="#d98943"/>
    <rect x="295" y="254" width="180" height="34" rx="17" fill="#4a7fb5"/>
    <rect x="312" y="216" width="180" height="34" rx="17" fill="#d98943"/>
    <rect x="302" y="178" width="180" height="34" rx="17" fill="#4a7fb5"/>
  </g>
  <text x="255" y="278" font-size="16" fill="#22303f" text-anchor="end">众人各出一只手</text>
  <text x="255" y="300" font-size="16" fill="#22303f" text-anchor="end">叠成一摞</text>

  <!-- 抓塔的大手:C 形握 -->
  <path d="M 560 160 q -60 -30 -95 10 M 560 400 q -60 30 -95 -10" stroke="#8f6ab0" stroke-width="30" fill="none" stroke-linecap="round"/>
  <rect x="545" y="150" width="70" height="260" rx="34" fill="#8f6ab0"/>
  <text x="640" y="285" font-size="16" fill="#8f6ab0">一人整把</text>
  <text x="640" y="307" font-size="16" fill="#8f6ab0">抓住摇晃</text>

  <!-- 摇动箭头 -->
  <path d="M 330 130 q 60 -26 130 0" stroke="#c0392b" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 466 128 l -14 -10 m 14 10 l -16 6" stroke="#c0392b" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 460 425 q -60 26 -130 0" stroke="#c0392b" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 334 427 l 14 10 m -14 -10 l 16 -6" stroke="#c0392b" stroke-width="5" fill="none" stroke-linecap="round"/>

  <text x="40" y="470" font-size="16" fill="#22303f">① 众人单手叠塔　② 一人整把抓住上下摇　③ 触发条件时按约定判输(最上层 / 先脱手)——条件主持现挂</text>
</svg>
