<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif">
  <rect width="800" height="500" fill="#fdfbf6"/>
  <text x="40" y="52" font-size="30" font-weight="bold" fill="#22303f">交叉握手对峙</text>
  <text x="40" y="80" font-size="14" fill="#8a94a0">pat-t1-01 · 演示只画动作,结算由主持现场宣布</text>

  <!-- 倒数气泡 -->
  <rect x="290" y="108" width="220" height="46" rx="23" fill="#22303f"/>
  <text x="400" y="139" font-size="22" fill="#fff" text-anchor="middle">「一、二、三!」</text>

  <!-- 甲的手(左,蓝):掌 + 四指伸向右,与乙的指交错 -->
  <rect x="150" y="200" width="120" height="160" rx="45" fill="#4a7fb5"/>
  <text x="210" y="390" font-size="18" fill="#4a7fb5" text-anchor="middle" font-weight="bold">甲</text>
  <line x1="260" y1="218" x2="490" y2="228" stroke="#4a7fb5" stroke-width="26" stroke-linecap="round"/>
  <line x1="260" y1="258" x2="500" y2="268" stroke="#4a7fb5" stroke-width="26" stroke-linecap="round"/>
  <line x1="260" y1="298" x2="495" y2="308" stroke="#4a7fb5" stroke-width="26" stroke-linecap="round"/>
  <line x1="260" y1="338" x2="480" y2="346" stroke="#4a7fb5" stroke-width="26" stroke-linecap="round"/>

  <!-- 乙的手(右,橙):掌 + 四指伸向左,插进甲的指缝 -->
  <rect x="530" y="220" width="120" height="160" rx="45" fill="#d98943"/>
  <text x="590" y="410" font-size="18" fill="#d98943" text-anchor="middle" font-weight="bold">乙</text>
  <line x1="540" y1="238" x2="310" y2="248" stroke="#d98943" stroke-width="26" stroke-linecap="round"/>
  <line x1="540" y1="278" x2="300" y2="288" stroke="#d98943" stroke-width="26" stroke-linecap="round"/>
  <line x1="540" y1="318" x2="305" y2="328" stroke="#d98943" stroke-width="26" stroke-linecap="round"/>
  <line x1="540" y1="358" x2="320" y2="366" stroke="#d98943" stroke-width="26" stroke-linecap="round"/>

  <text x="400" y="205" font-size="15" fill="#22303f" text-anchor="middle">十指交叉、紧扣不放</text>

  <!-- 事故背书注记 -->
  <text x="40" y="432" font-size="15" fill="#c0392b">⚠ 是「手指交叉扣紧」,不是击掌/握手——口述常被听岔,以本图为准。</text>

  <text x="40" y="470" font-size="16" fill="#22303f">① 两人十指交叉紧扣　② 同喊「一、二、三!」　③ 先松手的人输 → 进结算</text>
</svg>
