<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif">
  <rect width="800" height="500" fill="#fdfbf6"/>
  <text x="40" y="52" font-size="30" font-weight="bold" fill="#22303f">脖后抓手指</text>
  <text x="40" y="80" font-size="14" fill="#8a94a0">pat-t1-08 · 背视图 · 高野度后续槽位归原子,不入本图</text>

  <!-- 背影:头 + 肩 -->
  <circle cx="400" cy="180" r="52" fill="#cfd8e0"/>
  <path d="M 280 400 q 0 -110 120 -112 q 120 2 120 112 z" fill="#dde4ea"/>

  <!-- 交叉的双臂(从肩绕到脖后) -->
  <path d="M 300 330 Q 330 240 448 236" stroke="#4a7fb5" stroke-width="30" fill="none" stroke-linecap="round"/>
  <path d="M 500 330 Q 470 240 352 236" stroke="#d98943" stroke-width="30" fill="none" stroke-linecap="round"/>

  <!-- 十指(编号胶囊,列在脖后) -->
  <g font-size="14" font-weight="bold" text-anchor="middle">
    <g fill="#e8eef4" stroke="#4a7fb5" stroke-width="2">
      <rect x="290" y="246" width="26" height="44" rx="13"/><rect x="322" y="240" width="26" height="44" rx="13"/>
      <rect x="354" y="236" width="26" height="44" rx="13"/><rect x="386" y="234" width="26" height="44" rx="13"/>
      <rect x="450" y="240" width="26" height="44" rx="13"/>
      <rect x="482" y="246" width="26" height="44" rx="13"/>
    </g>
    <rect x="418" y="234" width="26" height="44" rx="13" fill="#d98943" stroke="#b06a2c" stroke-width="3"/>
    <text x="303" y="274" fill="#4a7fb5">1</text><text x="335" y="268" fill="#4a7fb5">2</text>
    <text x="367" y="264" fill="#4a7fb5">3</text><text x="399" y="262" fill="#4a7fb5">4</text>
    <text x="431" y="262" fill="#fff">7</text>
    <text x="463" y="268" fill="#4a7fb5">8</text><text x="495" y="274" fill="#4a7fb5">9</text>
  </g>
  <!-- 动的手指的动感线 -->
  <path d="M 431 218 l -8 -18 m 8 18 l 8 -18" stroke="#c0392b" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 主持口令气泡 -->
  <rect x="580" y="150" width="180" height="52" rx="26" fill="#22303f"/>
  <text x="670" y="184" font-size="20" fill="#fff" text-anchor="middle">「动 7 号!」</text>
  <path d="M 596 200 l -30 26 l 44 -12 z" fill="#22303f"/>

  <text x="40" y="470" font-size="16" fill="#22303f">① 双手十指交叉放脖子后　② 主持点号,对应手指要动　③ 动错 / 没反应的进结算(主持宣布)</text>
</svg>
