<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif">
  <rect width="800" height="500" fill="#fdfbf6"/>
  <text x="40" y="52" font-size="30" font-weight="bold" fill="#22303f">七星龙珠 · 牌阵</text>
  <text x="40" y="80" font-size="14" fill="#8a94a0">pat-t1-06 · 去大小王,抽 7 张摆阵;结算档位由主持宣布</text>

  <!-- 中央龙珠 -->
  <g>
    <rect x="368" y="218" width="64" height="92" rx="8" fill="#d98943" stroke="#b06a2c" stroke-width="3"/>
    <text x="400" y="270" font-size="18" fill="#fff" text-anchor="middle" font-weight="bold">龙珠</text>
  </g>
  <!-- 六星环绕 -->
  <g fill="#e8eef4" stroke="#4a7fb5" stroke-width="3">
    <rect x="368" y="96"  width="64" height="92" rx="8"/>
    <rect x="368" y="340" width="64" height="92" rx="8"/>
    <rect x="252" y="152" width="64" height="92" rx="8"/>
    <rect x="484" y="152" width="64" height="92" rx="8"/>
    <rect x="252" y="284" width="64" height="92" rx="8"/>
    <rect x="484" y="284" width="64" height="92" rx="8"/>
  </g>
  <g font-size="15" fill="#4a7fb5" text-anchor="middle">
    <text x="400" y="148">星</text><text x="400" y="392">星</text>
    <text x="284" y="204">星</text><text x="516" y="204">星</text>
    <text x="284" y="336">星</text><text x="516" y="336">星</text>
  </g>

  <!-- 余牌堆 -->
  <g>
    <rect x="92" y="330" width="64" height="92" rx="8" fill="#cfd8e0"/>
    <rect x="84" y="322" width="64" height="92" rx="8" fill="#dde4ea"/>
    <rect x="76" y="314" width="64" height="92" rx="8" fill="#eef2f6" stroke="#8a94a0" stroke-width="2"/>
    <text x="108" y="446" font-size="15" fill="#8a94a0" text-anchor="middle">余牌·轮流翻</text>
  </g>
  <path d="M 165 340 q 60 -50 85 -60" stroke="#c0392b" stroke-width="4" fill="none" stroke-dasharray="8 6"/>

  <!-- 规则注 -->
  <text x="600" y="120" font-size="15" fill="#22303f">翻出的牌与 6 星之一</text>
  <text x="600" y="142" font-size="15" fill="#22303f">同点数 → 撞星,结算×1</text>
  <text x="600" y="172" font-size="15" fill="#c0392b">与中央龙珠同点数</text>
  <text x="600" y="194" font-size="15" fill="#c0392b">→ 撞珠,结算×2</text>
  <text x="600" y="224" font-size="15" fill="#8a94a0">都不撞 → 安全过</text>

  <text x="40" y="470" font-size="16" fill="#22303f">① 抽 7 张:1 张居中为龙珠,6 张环绕　② 依次翻余牌　③ 撞星×1、撞珠×2,进结算(档位主持宣布)</text>
</svg>
